<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="circleGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F4FA8" />
      <stop offset="50%" stop-color="#13A8B8" />
      <stop offset="100%" stop-color="#7CC244" />
    </linearGradient>

    <linearGradient id="textGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0F4FA8" />
      <stop offset="50%" stop-color="#13A8B8" />
      <stop offset="100%" stop-color="#7CC244" />
    </linearGradient>
  </defs>

  <!-- Circle background -->
  <circle cx="140" cy="200" r="130" fill="url(#circleGradient)" />

  <!-- Cross shape -->
  <rect x="95" y="105" width="90" height="190" rx="18" fill="#F5F5F5" />
  <rect x="45" y="155" width="190" height="90" rx="18" fill="#F5F5F5" />

  <!-- Letters inside cross -->
  <g fill="#0F4FA8" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">
    <text x="140" y="135" font-size="34">L</text>
    <text x="140" y="175" font-size="34">E</text>
    <text x="140" y="215" font-size="34">A</text>
    <text x="140" y="255" font-size="34">L</text>

    <text x="82" y="205" font-size="34">L</text>
    <text x="112" y="205" font-size="34">E</text>

    <text x="170" y="205" font-size="34">A</text>
    <text x="200" y="205" font-size="34">L</text>
  </g>

  <!-- Brand name -->
  <text x="300" y="115"
        font-family="Arial, sans-serif"
        font-size="64"
        letter-spacing="2"
        fill="#0F4FA8">
    DROGUERÍA
  </text>

  <text x="300" y="280"
        font-family="Arial Black, Arial, sans-serif"
        font-size="180"
        font-weight="900"
        fill="url(#textGradient)">
    LEAL
  </text>

  <!-- Medical plus -->
  <g transform="translate(620 130)">
    <rect x="18" y="0" width="24" height="80" rx="12" fill="#F5F5F5" />
    <rect x="0" y="18" width="80" height="24" rx="12" fill="#F5F5F5" />
  </g>

  <!-- Slogan -->
  <text x="305" y="350"
        font-family="Arial, sans-serif"
        font-size="42"
        letter-spacing="4"
        fill="#0F4FA8">
    TU LUGAR DE CONFIANZA
  </text>
</svg>
